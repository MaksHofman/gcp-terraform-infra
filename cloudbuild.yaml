substitutions:
  _TF_VERSION: '1.7.0'
  _PROJECT_ID: 'plated-analyzer-495108-v2'

steps:

  # ── CI: POBIERZ TERRAFORM ──────────────────────────────────
  - name: 'alpine'
    id: 'Pobierz Terraform'
    entrypoint: 'sh'
    args:
      - '-c'
      - |
        wget -q https://releases.hashicorp.com/terraform/${_TF_VERSION}/terraform_${_TF_VERSION}_linux_amd64.zip
        unzip -q terraform_${_TF_VERSION}_linux_amd64.zip
        mv terraform /workspace/terraform

  # ── CI: FORMAT CHECK ───────────────────────────────────────
  # Sprawdza czy kod .tf jest poprawnie sformatowany
  # Failuje jesli ktos nie odpalil "terraform fmt" przed pushem
  - name: 'alpine'
    id: 'CI - terraform fmt check'
    entrypoint: '/workspace/terraform'
    args:
      - fmt
      - -check
      - -recursive

  # ── CI: VALIDATE ───────────────────────────────────────────
  # Sprawdza skladnie i logike kodu bez laczenia sie z GCP
  # Wykrywa: brakujace zmienne, bledne typy, literowki w nazwach zasobow
  - name: 'alpine'
    id: 'CI - terraform validate'
    entrypoint: 'sh'
    args:
      - '-c'
      - |
        /workspace/terraform init -backend=false
        /workspace/terraform validate
    env:
      - 'TF_VAR_project_id=${_PROJECT_ID}'

  # ── CD: INIT ───────────────────────────────────────────────
  - name: 'alpine'
    id: 'CD - terraform init'
    entrypoint: '/workspace/terraform'
    args:
      - init
      - -backend-config=bucket=tfstate-${_PROJECT_ID}
      - -backend-config=prefix=gke/terraform.tfstate
    env:
      - 'TF_VAR_project_id=${_PROJECT_ID}'

  # ── CD: PLAN ───────────────────────────────────────────────
  - name: 'alpine'
    id: 'CD - terraform plan'
    entrypoint: '/workspace/terraform'
    args:
      - plan
      - -out=tfplan
    env:
      - 'TF_VAR_project_id=${_PROJECT_ID}'

  # ── CD: APPLY ──────────────────────────────────────────────
  - name: 'alpine'
    id: 'CD - terraform apply'
    entrypoint: '/workspace/terraform'
    args:
      - apply
      - -auto-approve
      - tfplan
    env:
      - 'TF_VAR_project_id=${_PROJECT_ID}'

options:
  logging: CLOUD_LOGGING_ONLY